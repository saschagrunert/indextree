name: ci
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: creyD/prettier_action@8c18391fdc98ed0d884c6345f03975edac71b8f0 # v4.6
        with:
          dry: true
          prettier_options: --check .

  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo generate-lockfile
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
            ~/.cargo/registry
          key: rust-lint-rustfmt-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-lint-rustfmt-
      - run: make lint-rustfmt

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: clippy
      - run: cargo generate-lockfile
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
            ~/.cargo/registry
          key: rust-lint-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-lint-clippy-
      - run: make lint-clippy

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.85.0"
      - run: cargo generate-lockfile
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
            ~/.cargo/registry
          key: rust-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-msrv-
      - run: cargo test --all-features

  test-no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo generate-lockfile
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
            ~/.cargo/registry
          key: rust-test-no-std-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-test-no-std-
      - run: cargo test --no-default-features
      - run: cargo test --no-default-features --features deser
      - run: cargo test --no-default-features --features macros

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@d858f8113943481093e02986a7586a4819a3bfd6 # v2.71.2
        with:
          tool: cargo-llvm-cov
      - name: Generate code coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
      - run: cargo generate-lockfile
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target
            ~/.cargo/registry
          key: rust-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: rust-doc-
      - name: Build docs (all features)
        run: make build-doc
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Build docs (no default features)
        run: cargo doc --no-deps --no-default-features
        env:
          RUSTDOCFLAGS: -D warnings
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs
          path: target/doc

  doc-publish:
    if: github.ref == 'refs/heads/main'
    needs: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs
          path: target/doc
      - name: Update gh-pages branch
        run: |
          git config --global user.email mail@saschagrunert.de
          git config --global user.name "GitHub Actions"
          git fetch origin gh-pages
          git checkout -f gh-pages
          rm -rf doc
          mv target/doc .
          git add .
          git diff-index --quiet HEAD || git commit -m 'Update documentation'
          git push -f origin gh-pages
